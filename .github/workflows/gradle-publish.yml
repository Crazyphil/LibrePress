# This workflow will build a package using Gradle and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#Publishing-using-gradle

name: Gradle Package

on:
  release:
    types: [ created ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
          server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
          settings-path: ${{ github.workspace }} # location for the settings.xml file

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build with Gradle
        run: ./gradlew build
        env:
          CREDENTIALS_USERNAME: ${{ secrets.CREDENTIALS_USERNAME }}
          CREDENTIALS_PASSWORD: ${{ secrets.CREDENTIALS_PASSWORD }}
          CREDENTIALS_ACTIVATION_TOKEN: ${{ secrets.CREDENTIALS_ACTIVATION_TOKEN }}
          CREDENTIALS_CLIENT_ID: ${{ secrets.CREDENTIALS_CLIENT_ID }}
          CREDENTIALS_LICENSE_URL: ${{ secrets.CREDENTIALS_LICENSE_URL }}

      # The USERNAME and TOKEN need to correspond to the credentials environment variables used in
      # the publishing section of your build.gradle
      - name: Publish to GitHub Packages
        run: ./gradlew publish
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
